name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  detect-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node.js 프로젝트 감지
      - name: Node.js 테스트
        if: hashFiles('package.json') != ''
        run: |
          node_version=$(jq -r '.engines.node // "20"' package.json | grep -oE '[0-9]+' | head -1)
          echo "Node.js ${node_version} 사용"
        # Node 설정은 프로젝트별로 추가

      # verify:test-coverage — 모든 워크스페이스에 Vitest 설정 존재 강제
      - name: verify:test-coverage
        if: hashFiles('scripts/verify-test-coverage.mjs') != ''
        run: node scripts/verify-test-coverage.mjs

      # Python 프로젝트 감지
      - name: Python 테스트
        if: hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != ''
        run: |
          echo "Python 프로젝트 감지됨"
        # Python 설정은 프로젝트별로 추가

      # Go 프로젝트 감지
      - name: Go 테스트
        if: hashFiles('go.mod') != ''
        run: |
          echo "Go 프로젝트 감지됨"
        # Go 설정은 프로젝트별로 추가

      # Rust + WASM 툴체인 (packages/physics-wasm)
      - name: Rust 툴체인 설정
        if: hashFiles('rust-toolchain.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.94.1'
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: wasm-pack 설치
        if: hashFiles('packages/physics-wasm/Cargo.toml') != ''
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Rust 테스트 (physics-wasm)
        if: hashFiles('packages/physics-wasm/Cargo.toml') != ''
        run: cargo test --manifest-path packages/physics-wasm/Cargo.toml

      # Makefile 기반
      - name: Make 테스트
        if: hashFiles('Makefile') != ''
        run: |
          if grep -q "^test:" Makefile; then
            make test
          fi
